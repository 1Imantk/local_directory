{% extends "base.html" %}
{% block title %}Add Business — BizDirectory NG{% endblock %}

{% block content %}

<div style="max-width:600px; margin:0 auto;">
  <h2 style="margin-bottom:1.5rem; color:#1a237e;">➕ Register a New Business</h2>

  <div class="card">
    <form method="POST" action="{{ url_for('add_business') }}">

      <div class="form-group">
        <label for="name">Business Name *</label>
        <input type="text" id="name" name="name" placeholder="e.g. Kano Tech Hub" required />
      </div>

      <div class="form-group">
        <label for="category">Category *</label>
        <select id="category" name="category" required>
          <option value="" disabled selected>Select a category</option>
          <option value="Agriculture">Agriculture</option>
          <option value="Construction">Construction</option>
          <option value="Education">Education</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Finance">Finance</option>
          <option value="Food & Dining">Food & Dining</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Hospitality">Hospitality</option>
          <option value="Retail">Retail</option>
          <option value="Technology">Technology</option>
          <option value="Transportation">Transportation</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="location">Location *</label>
        <input type="text" id="location" name="location"
               placeholder="e.g. Kano, Nigeria" required />
      </div>

      <div class="form-group">
        <label for="description">Description * <span id="charCount" style="font-weight:normal; color:#666;">(0/200)</span></label>
        <textarea id="description" name="description"
                  placeholder="What does this business do?" required
                  maxlength="200" oninput="updateCharCount()"></textarea>
      </div>

      <div class="form-group">
        <label for="contact">Contact (email or phone) *</label>
        <input type="text" id="contact" name="contact"
               placeholder="e.g. info@business.com or +234-800-000-0000" required />
      </div>

      <div class="form-group">
        <label for="founded_year">Founded Year</label>
        <input type="number" id="founded_year" name="founded_year"
               placeholder="e.g. 2020" min="1800" max="2030" />
      </div>

      <div class="form-group">
        <label for="website">Website / Social Media URL</label>
        <input type="url" id="website" name="website"
               placeholder="e.g. https://example.com or https://twitter.com/example" />
      </div>

      <button type="submit" class="btn btn-primary">Register Business</button>
      <a href="{{ url_for('index') }}" class="btn" style="background:#eee; color:#333; margin-left:.5rem;">
        Cancel
      </a>

    </form>
  </div>
</div>

<script>
function updateCharCount() {
  var desc = document.getElementById('description');
  var counter = document.getElementById('charCount');
  counter.textContent = '(' + desc.value.length + '/200)';
  counter.style.color = desc.value.length >= 180 ? '#d32f2f' : '#666';
}
</script>

{% endblock %}
